name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: xuebao-deploy
  cancel-in-progress: false

env:
  DEPLOY_BRANCH: main

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    if: github.ref_name == 'main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment scripts
        run: |
          sh -n scripts/validate-deploy-env.sh
          sh -n scripts/backup-data.sh
          sh -n scripts/deploy.sh

      - name: Prepare compose validation env
        run: cp .env.example .env

      - name: Validate compose file
        run: docker compose -f docker-compose.yml config

      - name: Prepare SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy over SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_TARGET_PATH: ${{ secrets.DEPLOY_TARGET_PATH }}
        run: |
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_TARGET_PATH"
          PORT="${DEPLOY_PORT:-22}"
          ssh -i ~/.ssh/deploy_key -p "$PORT" -o StrictHostKeyChecking=accept-new "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd '$DEPLOY_TARGET_PATH' && git fetch --prune origin && git checkout '$DEPLOY_BRANCH' && git pull --ff-only origin '$DEPLOY_BRANCH' && scripts/deploy.sh"

      - name: Deployment result
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "Deployment completed successfully."
          else
            echo "Deployment failed. Check previous workflow steps and server logs."
            exit 1
          fi
