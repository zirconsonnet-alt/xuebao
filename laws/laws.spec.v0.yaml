      - 第二十三条第七项
    approval:
      type: approve_gt_reject
      approve_min_of_turnout: 1/2
    turnout_min_of_all_voting_members: 1/2
    min_vote_period: 24h
    anonymous: true
  honor_owner_election_runoff:
    sources:
      - 第二十三条第五项
      - 第二十三条第六项
      - 第二十三条第七项
    approval:
      type: highest_vote_wins
      winner_min_of_turnout: 1/2
    turnout_min_of_all_voting_members: 1/2
