workflow_fsm:
  ordinary_proposal:
    sources:
      - 第十四条
      - 第十五条
      - 第十六条
      - 第十七条
      - 第十八条
      - 第十九条
      - 第二十条
    initial_state: filed
    terminal_states:
      - closed
    states:
      - filed
      - procedural_review
      - correction_requested
      - procedurally_rejected
      - discussion
      - voting
      - approved
      - rejected
      - closed
    transitions:
      - from: filed
        event: proposal_submitted
        to: procedural_review
        guards:
          - art_04_12_procedural_review_scope
          - art_16_ordinary_proposal_review
      - from: procedural_review
        event: correction_requested
        to: correction_requested
      - from: procedural_review
        event: proposal_passed_procedural_review
        to: discussion
        guards:
          - art_17_discussion_periods
      - from: procedural_review
        event: review_timeout
        to: discussion
        guards:
          - art_16_ordinary_proposal_review
      - from: procedurally_rejected
        event: rejection_escalated_with_signatures
        to: voting
        guards:
          - art_16_ordinary_proposal_review
      - from: discussion
        event: discussion_period_elapsed
        to: voting
        guards:
          - art_17_discussion_periods
      - from: voting
        event: vote_passed
        to: approved
        guards:
          - art_04_05_voter_roster_freeze
          - art_18_general_vote_thresholds
      - from: voting
        event: vote_failed
        to: rejected
        guards:
          - art_04_05_voter_roster_freeze
