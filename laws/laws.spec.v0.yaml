      - restrict_repeat_motion_within_14d_on_same_major_fact_and_reason
      - allow_repeat_if_new_major_fact_or_higher_threshold
      - ignore_malicious_preemptive_repeat_for_exclusion_effect
      - prefer_regular_reelection_if_term_remaining_lt_7d
    deadline:
      cooling_min: 12h
      repeat_limit_window: 14d
    exceptions:
      - new_major_fact
      - higher_threshold_reached
      - malicious_preemptive_repeat
      - council_term_remaining_lt_7d
    review_entry: gate_same_major_fact_and_institutional_reason
    decidability:
      overall: mixed
      machine_decidable:
        - cooling_elapsed
        - term_remaining_lt_7d
        - threshold_increase_math
      human_review_required:
        - same_major_fact
        - new_major_fact
        - malicious_preemptive_repeat

  - id: art_56_daily_management_ladder
    article: 第五十六条
    category: workflow_guard
    subject: daily_management
    when:
      trigger: ordinary_management_considered
    then:
      - prefer_reminder_before_warning_or_restriction
      - prefer_warning_or_restriction_before_formal_discipline
      - allow_direct_necessary_measure_for_serious_or_real_safety_risk
      - require_daily_management_to_stay_within_temporary_light_measures
    deadline: immediately
    exceptions:
      - serious_circumstance
      - real_safety_risk
    review_entry: gate_bypass_formal_rulemaking
    decidability:
      overall: mixed
      machine_decidable:
        - ladder_stage_recorded
        - escalation_hint_present
      human_review_required:
        - whether_direct_jump_is_necessary
        - whether_real_safety_risk_exists

  - id: art_57_daily_management_sanction_catalog
    article: 第五十七条
    category: sanction_rule
    subject: daily_management
    when:
      trigger: daily_management_action_selected
    then:
      - allow_reminder_warning_short_mute_motion_restriction
      - short_mute_general_max_24h
      - motion_restriction_must_be_temporary_and_recorded
      - forbid_daily_management_from_directly_imposing_long_mute_remove_member_restrict_vote_or_candidacy
      - major_sanction_must_redirect_to_formal_or_emergency_process
    deadline: immediately
    exceptions:
      - real_safety_risk_redirected_to_emergency_process
    review_entry: gate_bypass_formal_rulemaking
    decidability:
      overall: mixed
      machine_decidable:
        - action_in_catalog
        - short_mute_duration_lte_24h
        - forbidden_major_sanction_rejected
      human_review_required:
        - whether_motion_restriction_is_still_temporary
        - whether_escalation_to_formal_is_required

  - id: art_58_evidence_baseline
    article: 第五十八条
    category: evidence_rule
    subject: evidence
    when:
      trigger: evidence_submitted_or_reviewed
    then:
      - prefer_bot_logs_platform_records_full_chat_logs
      - require_context_for_screenshots_and_recordings
      - treat_anonymous_complaint_as_lead_not_alone_basis_for_major_sanction
      - protect_private_sensitive_evidence
      - require_minimum_sufficient_summary_to_target
    deadline: before_major_sanction_vote
    exceptions:
      - privacy_or_minor_or_real_world_safety_risk
    review_entry: gate_evidence_sufficiency_and_privacy
    decidability:
      overall: human_review_required
      machine_decidable: []
      human_review_required:
        - source_reliability
        - context_integrity
        - minimum_sufficient_summary

  - id: art_59_formal_discipline_scope
    article: 第五十九条
    category: sanction_rule
    subject: formal_discipline
    when:
      trigger: formal_discipline_requested
    then:
      - formal_discipline_scope_limited_to_long_mute_restrict_vote_restrict_candidacy_remove_member
      - reminders_warnings_short_mutes_and_motion_restrictions_stay_in_daily_management
      - real_safety_risk_first_uses_emergency_protection_then_bridge_if_needed
      - require_scope_catalog_and_summary_to_be_recorded_on_case
    deadline: immediately
    exceptions:
      - temporary_emergency_measure_before_formal_bridge
    review_entry: gate_bypass_formal_rulemaking
    decidability:
      overall: mixed
      machine_decidable:
        - requested_sanction_in_formal_scope_catalog
        - scope_catalog_recorded
      human_review_required:
        - whether_escalation_from_daily_management_is_necessary
        - whether_real_safety_risk_requires_emergency_first

  - id: art_60_formal_discipline_acceptance
    article: 第六十条
    category: workflow_guard
    subject: formal_discipline
    when:
      trigger: discipline_application_submitted
    then:
      - allow_any_member_submission
      - require_formal_filing_by_honor_owner_or_council_or_3_voting_members_or_10_percent_voting_members
      - require_object_fact_time_evidence_cited_articles_requested_sanction
      - council_handles_procedural_acceptance
      - direct_group_start_if_council_cannot_act
      - deemed_accepted_if_no_disposition_within_48h
      - prohibit_duplicate_case_without_new_fact_or_new_evidence
    deadline: 48h
    exceptions:
      - council_recusal_absence_or_insufficient_number
    review_entry: gate_same_major_fact_and_institutional_reason
    decidability:
      overall: mixed
      machine_decidable:
        - filing_threshold_math
        - timeout
        - required_fields_present
      human_review_required:
        - no_new_fact_or_new_evidence
        - council_cannot_act

  - id: art_60_1_notice_delivery
    article: 第六十条之一
    category: workflow_guard
    subject: procedural_notice
    when:
      trigger: procedural_notice_created
    then:
      - deliver_in_priority_order
      - deem_group_announcement_immediate_if_visible
      - deem_bot_dm_or_platform_dm_after_6h
      - deem_agreed_off_group_channel_after_12h
      - require_at_least_one_contactable_channel_if_removed_or_muted_or_platform_failure
      - allow_procedure_continue_after_two_feasible_attempts_or_single_feasible_attempt_with_public_note
      - preserve_followup_statement_and_review_right
    deadline: per_channel
    exceptions:
      - channel_unavailable_due_to_objective_reason
    review_entry: gate_notice_feasibility_review
    decidability:
      overall: mixed
      machine_decidable:
        - deemed_service_time
        - attempt_count
      human_review_required:
        - visibility
        - feasible_channel
        - objective_reason

  - id: art_61_defense_window
    article: 第六十一条
    category: timer_rule
    subject: formal_discipline
    when:
      trigger: discipline_case_accepted
    then:
      - notify_fact_basis_main_evidence_summary_requested_sanction_defense_deadline
      - set_general_defense_min_12h
      - set_remove_or_restrict_vote_or_restrict_candidacy_defense_min_24h
      - allow_target_response_evidence_and_objection
      - allow_continue_if_target_refuses_or_loses_contact_or_exits_after_recorded_service_and_wait
    deadline:
      general: 12h
      severe_rights_affecting: 24h
    exceptions:
      - explicit_waiver_by_target
    review_entry: gate_notice_feasibility_review
    decidability:
      overall: mixed
      machine_decidable:
        - defense_window_duration
        - waiver_recorded
      human_review_required:
        - major_evidence_summary_sufficient

  - id: art_62_evidence_review_for_major_sanction
    article: 第六十二条
    category: evidence_rule
    subject: formal_discipline
    when:
      trigger: evidence_review_started
    then:
      - require_reviewable_record
      - require_basic_fact_clarity
      - require_key_fact_corroboration
      - forbid_major_sanction_based_only_on_anonymous_or_single_hearsay_or_truncated_material
      - if_key_fact_unclear_then_no_major_sanction
    deadline: before_vote_open
    exceptions: []
    review_entry: gate_evidence_sufficiency_and_privacy
    decidability:
      overall: human_review_required
      machine_decidable: []
      human_review_required:
        - basic_fact_clarity
        - corroboration
        - truncated_material_significance

  - id: art_63_formal_discipline_vote
    article: 第六十三条
    category: voting_rule
    subject: formal_discipline
    when:
      trigger: discipline_evidence_review_completed
    then:
      - require_group_vote_for_major_sanction
      - forbid_council_final_major_sanction_alone
      - use_case_specific_thresholds
      - allow_vote_down_to_lighter_sanction_if_heavier_one_fails
      - require_anonymous_vote
    deadline: after_review_complete
    exceptions: []
    review_entry: gate_vote_validity_review
    decidability:
      overall: machine_decidable
      machine_decidable:
        - threshold_calculation
        - anonymous_vote_required
        - lighter_sanction_fallback_order
      human_review_required: []

  - id: art_64_execution_limits
    article: 第六十四条
    category: execution_rule
    subject: formal_discipline
    when:
      trigger: discipline_vote_passed
    then:
      - decision_must_include_fact_basis_evidence_summary_content_duration_effective_time_review_channel
      - non_removal_sanctions_require_explicit_duration
      - long_mute_single_max_30d_normally
      - restrict_vote_or_candidacy_single_max_90d_normally
      - require_new_process_for_extension
      - bot_executes_and_records
      - publish_summary_without_unnecessary_privacy_leak
    deadline: immediately_after_vote_result
    exceptions: []
    review_entry: gate_privacy_safe_public_summary
    decidability:
      overall: mixed
      machine_decidable:
        - required_decision_fields_present
        - duration_caps
      human_review_required:
        - unnecessary_privacy_leak

  - id: art_65_review_entry
    article: 第六十五条
    category: workflow_guard
    subject: formal_discipline_review
    when:
      trigger: review_requested
    then:
      - allow_request_by_target_or_3_voting_members_or_10_percent_voting_members
      - limit_reasons_to_new_evidence_or_key_procedural_error_or_obvious_fact_error_or_manifest_disproportion
      - council_decides_whether_to_start_review_within_48h
      - direct_group_start_if_council_cannot_act
      - deem_started_if_timeout
      - allow_pause_execution_if_clear_procedural_illegality_or_key_evidence_false
    deadline: 48h
    exceptions:
      - council_recusal_absence_or_insufficient_number
    review_entry: gate_review_reason_validity
    decidability:
      overall: mixed
      machine_decidable:
        - signature_threshold_math
        - timeout
      human_review_required:
        - review_reason_validity
        - manifest_disproportion
        - key_evidence_false

  - id: art_66_emergency_to_formal_bridge
    article: 第六十六条
    category: workflow_guard
    subject: emergency_and_formal_discipline
    when:
      trigger: emergency_measure_extended_or_major_sanction_contemplated
    then:
      - convert_to_formal_discipline_if_total_gt_48h
      - convert_to_formal_discipline_if_planned_major_sanction
      - reuse_emergency_logs_as_material
      - still_require_notice_defense_vote_review
      - credit_temporary_duration_against_same_type_final_sanction
      - forbid_repeat_extension_to_replace_formal_discipline
    deadline: immediately_on_threshold_hit
    exceptions: []
    review_entry: gate_bypass_formal_rulemaking
    decidability:
      overall: mixed
      machine_decidable:
        - total_duration_gt_48h
        - requested_major_sanction_type
      human_review_required:
        - repeated_extension_for_bypass

  - id: art_67_interpretation_boundary
    article: 第六十七条
    category: global_guard
    subject: temporary_interpretation
    when:
      trigger: temporary_interpretation_used
    then:
      - permit_only_to_keep_procedure_running
      - forbid_new_sanction_types
      - forbid_expanding_high_risk_powers
      - forbid_depriving_vote_support_or_candidate_eligibility
      - forbid_excluding_evidence_review
      - escalate_rights_sensitive_doubt_to_group_review
    deadline: as_soon_as_practicable
    exceptions: []
    review_entry: gate_temporary_interpretation_boundary
    decidability:
      overall: mixed
      machine_decidable:
        - interpretation_recorded
      human_review_required:
        - whether_interpretation_only_keeps_procedure_running

  - id: art_68_revision_boundary
    article: 第六十八条
    category: workflow_guard
    subject: norm_amendment
    when:
      trigger: norm_amendment_proposed
    then:
      - require_constitutional_amendment_route_if_modifying_general_rules_or_basic_power_structure
      - forbid_vague_repeal_of_basic_member_rights_checks_and_balances_record_or_review_mechanisms
      - require_explicit_changed_articles_if_core_institution_is_modified
      - require_constitutional_amendment_threshold_if_core_institution_changes
    deadline: before_discussion_opens
    exceptions: []
    review_entry: gate_core_norm_amendment_boundary
    decidability:
      overall: mixed
      machine_decidable:
        - proposal_type_present
        - threshold_set_selected
      human_review_required:
        - whether_changed_scope_reaches_general_rules_or_basic_power_structure
        - whether_wording_vaguely_cancels_core_guarantees

  - id: art_69_effective_and_non_retroactivity
    article: 第六十九条
    category: transition_rule
    subject: law_regime_transition
    when:
      trigger: norm_or_regulation_passed_or_review_requested_for_pre_effective_case
    then:
      - require_effective_time_recorded_for_new_norm
      - prefer_new_rule_when_pre_effective_old_rule_conflicts_after_effective_time
      - do_not_retroactively_reopen_pre_effective_completed_procedures_by_default
      - allow_collective_review_only_if_major_procedural_illegality_or_safety_risk
    deadline: immediately_after_passage_or_before_legacy_review_entry
    exceptions:
      - major_procedural_illegality
      - safety_risk
    review_entry: gate_non_retroactivity_exception_review
    decidability:
      overall: mixed
      machine_decidable:
        - effective_time_present
        - pre_effective_completed_case_detected
      human_review_required:
        - whether_exception_reaches_major_procedural_illegality
        - whether_exception_reaches_safety_risk

threshold_sets:
  ordinary_proposal:
    sources:
      - 第十八条第一项
      - 第十八条第五项
      - 第十八条第七项
    approval:
      type: approve_gt_reject
      approve_min_of_turnout: 2/5
    turnout_min_of_all_voting_members: 1/3
    min_vote_period: 12h
    anonymous: false
  basic_governance_norm:
    sources:
      - 第十八条第二项
      - 第十八条第五项
      - 第十八条第七项
    approval:
      type: approve_gt_reject
      approve_min_of_turnout: 1/2
    turnout_min_of_all_voting_members: 1/2
    min_vote_period: 12h
    anonymous: false
  constitutional_amendment:
    sources:
      - 第十八条第三项
      - 第十八条第五项
      - 第十八条第七项
    approval:
      type: approve_gte_effective_votes_2_over_3
