lock_types:
  honor_owner_powers:
    sources: 第三十五条第一款
    applies_to: target_honor_owner
    released_when:
      - impeachment_closed
      - impeachment_rejected
      - partial_measure_replaced_by_new_case_resolution
  elder_powers:
    sources: 第三十九条第四款
    applies_to: target_elder
    released_when:
      - impeachment_closed
  reboot_procedure_protection:
    sources: 第五十一条
    applies_to:
      - proposers
      - endorsers
      - related_discussion_scope
    released_when:
      - reboot_closed
  temporary_mute:
    sources: 第四十四条第二项
    applies_to: emergency_target
    released_when:
      - expiry_reached
      - revoked_on_review
      - converted_and_credited_in_formal_discipline
  temporary_motion_restriction:
    sources: 第四十四条第三项
    applies_to: emergency_target
    released_when:
      - expiry_reached
      - revoked_on_review
  daily_management_motion_restriction:
    sources:
      - 第五十六条
      - 第五十七条
    applies_to: ordinary_management_target
    released_when:
      - expiry_reached
      - replaced_by_formal_discipline
  temporary_high_risk_power_suspension:
    sources: 第四十四条第四项
    applies_to: emergency_target
    released_when:
      - expiry_reached
      - revoked_on_review

side_effect_contracts:
  defaults:
    execution_record_required_fields:
      - case_id
      - side_effect
      - requested_by
      - executed_at
      - result
      - error_message_if_any
    binding_status_legend:
      existing_runtime: 已有明确运行时实现，且主执行路径已接入当前 owner
      existing_runtime_case_scoped: 已有实现，但通过案件级通用动作统一承接
      partial_existing_runtime: 已有部分运行时实现，但尚未完全覆盖 contract 中的抽象输出或副作用声明
      planned_runtime: 规范已定义，但当前仓库尚未接入运行时
    runtime_bindings:
      governance_storage:
        set_role_status: src/vendors/nonebot_plugin_law/governance/storage.py::GovernanceStorage.set_role_status
        revoke_role: src/vendors/nonebot_plugin_law/governance/storage.py::GovernanceStorage.revoke_role
        revoke_all_roles: src/vendors/nonebot_plugin_law/governance/storage.py::GovernanceStorage.revoke_all_roles
        create_case: src/vendors/nonebot_plugin_law/governance/storage.py::GovernanceStorage.create_case
        update_case_fields: src/vendors/nonebot_plugin_law/governance/storage.py::GovernanceStorage.update_case_fields
        resolve_case_status: src/vendors/nonebot_plugin_law/governance/storage.py::GovernanceStorage.resolve_case_status
        upsert_lock: src/vendors/nonebot_plugin_law/governance/storage.py::GovernanceStorage.upsert_lock
        release_case_locks: src/vendors/nonebot_plugin_law/governance/storage.py::GovernanceStorage.release_case_locks
      group_gateway:
        send_msg: src/support/group.py::Group.send_msg
        ban: src/support/group.py::Group.ban
        kick: src/support/group.py::Group.kick
        set_group_admin: src/support/group.py::Group.set_group_admin
        get_group_member_info: src/support/group.py::Group.get_group_member_info
        get_group_member_list: src/support/group.py::Group.get_group_member_list
      emits:
        - side_effect_completed
        - side_effect_failed
  effects:
    assign_honor_owner_role:
      binding_status: existing_runtime
      current_orchestration: src/vendors/nonebot_plugin_law/governance/manager.py::_set_honor_owner
      required_inputs:
        - target_member_id
        - operator_id
        - source_case_id
      storage_calls:
        - GovernanceStorage.revoke_role(previous_honor_owner_if_different)
        - GovernanceStorage.set_role_status(role_code=honor_owner,status=active)
      api_calls:
        - Group.set_group_admin(target_member_id,true) when_platform_sync_enabled
      emits:
        - side_effect_completed
        - governance_result_published
    reopen_nomination_if_needed:
      binding_status: existing_runtime
      current_orchestration: src/vendors/nonebot_plugin_law/governance/manager.py::_finalize_case_vote
      required_inputs:
        - source_case_id
        - reopen_reason
      storage_calls:
        - GovernanceStorage.create_case(case_type=honor_owner_election) when_new_nomination_needed
      api_calls:
        - Group.send_msg(reopen_notice)
      emits:
        - side_effect_completed
    revoke_honor_owner_role:
      binding_status: existing_runtime
      current_orchestration: src/vendors/nonebot_plugin_law/governance/manager.py::_finalize_case_vote
      required_inputs:
        - target_member_id
        - operator_id
        - source_case_id
      storage_calls:
        - GovernanceStorage.revoke_role(role_code=honor_owner)
      api_calls:
        - Group.set_group_admin(target_member_id,false) when_platform_sync_enabled
      emits:
        - side_effect_completed
    assign_elder_role:
      binding_status: existing_runtime
      current_orchestration: src/vendors/nonebot_plugin_law/governance/manager.py::_approve_elder_election_case
      required_inputs:
        - winner_member_ids
        - operator_id
        - source_case_id
      storage_calls:
        - GovernanceStorage.set_role_status(role_code=elder,status=active)
        - GovernanceStorage.update_case_fields(payload_json.term_started_at,payload_json.term_expires_at_by_member)
      api_calls: []
      emits:
        - side_effect_completed
    start_by_election:
      binding_status: existing_runtime
      current_orchestration: src/vendors/nonebot_plugin_law/governance/manager.py::_finalize_case_vote
      required_inputs:
        - source_case_id
        - triggered_by
      storage_calls:
        - GovernanceStorage.create_case(case_type=honor_owner_election)
      api_calls:
        - Group.send_msg(by_election_started_notice)
      emits:
        - side_effect_completed
    release_lock_honor_owner_powers:
      binding_status: existing_runtime_case_scoped
      current_orchestration: src/vendors/nonebot_plugin_law/governance/manager.py::_finalize_case_vote
      required_inputs:
        - source_case_id
      storage_calls:
        - GovernanceStorage.release_case_locks(source_case_id)
      api_calls: []
      emits:
        - governance_lock_released
        - side_effect_completed
    apply_lock_elder_powers:
      binding_status: existing_runtime
      current_orchestration: src/vendors/nonebot_plugin_law/governance/manager.py::_advance_case_after_support
      required_inputs:
        - source_case_id
        - target_member_id
        - reason
      storage_calls:
        - GovernanceStorage.upsert_lock(lock_type=elder_powers,target_member_id=target_member_id)
      api_calls: []
      emits:
        - governance_lock_applied
        - side_effect_completed
    revoke_elder_role:
      binding_status: existing_runtime
      current_orchestration: src/vendors/nonebot_plugin_law/governance/manager.py::_finalize_case_vote
      required_inputs:
        - target_member_id
        - operator_id
        - source_case_id
      storage_calls:
        - GovernanceStorage.revoke_role(role_code=elder)
      api_calls: []
      emits:
        - side_effect_completed
    trigger_by_election_if_needed:
      binding_status: existing_runtime
      current_orchestration: src/vendors/nonebot_plugin_law/governance/manager.py::_finalize_case_vote
      required_inputs:
        - source_case_id
        - vacancy_count
      storage_calls:
        - GovernanceStorage.create_case(case_type=elder_election) when_vacancy_requires_by_election
      api_calls:
        - Group.send_msg(by_election_started_notice)
      emits:
        - side_effect_completed
    release_lock_elder_powers:
      binding_status: existing_runtime_case_scoped
      current_orchestration: src/vendors/nonebot_plugin_law/governance/manager.py::_finalize_case_vote
      required_inputs:
        - source_case_id
      storage_calls:
        - GovernanceStorage.release_case_locks(source_case_id)
      api_calls: []
      emits:
        - governance_lock_released
        - side_effect_completed
    restore_feasible_participation_or_publish_objective_reason:
      binding_status: existing_runtime
      current_orchestration: src/vendors/nonebot_plugin_law/governance/manager.py::_advance_emergency_protection_case
      required_inputs:
        - target_member_id
        - source_case_id
        - objective_reason_if_not_restored
      storage_calls:
        - GovernanceStorage.update_case_fields(status=closed,phase=closed)
      api_calls:
        - Group.send_msg(restoration_or_objective_reason_notice)
      emits:
        - side_effect_completed
        - governance_result_published
    record_daily_management_note:
      binding_status: existing_runtime
      current_orchestration: src/vendors/nonebot_plugin_law/governance/manager.py::daily_management_command
      required_inputs:
        - target_member_id
        - action_type
        - reason
        - operator_id
      storage_calls:
        - GovernanceStorage.create_case(case_type=daily_management)
        - GovernanceStorage.update_case_fields(payload_json.public_summary_ref,execution_ref,resolved_at)
      api_calls:
        - Group.send_msg(daily_management_summary)
      emits:
        - governance_case_created
        - governance_result_published
        - side_effect_completed
    apply_daily_management_short_mute:
      binding_status: existing_runtime
      current_orchestration: src/vendors/nonebot_plugin_law/governance/manager.py::daily_management_command
      required_inputs:
        - target_member_id
        - sanction_duration
        - operator_id
        - source_case_id
      storage_calls:
        - GovernanceStorage.create_case(case_type=daily_management)
        - GovernanceStorage.update_case_fields(payload_json.public_summary_ref,execution_ref,resolved_at)
      api_calls:
        - Group.ban(target_member_id,duration_seconds)
        - Group.send_msg(daily_management_summary)
      emits:
        - side_effect_completed
        - governance_result_published
    apply_daily_management_motion_restriction:
      binding_status: existing_runtime
      current_orchestration: src/vendors/nonebot_plugin_law/governance/manager.py::daily_management_command
      required_inputs:
        - target_member_id
        - expires_at
        - operator_id
        - source_case_id
      storage_calls:
        - GovernanceStorage.create_case(case_type=daily_management)
        - GovernanceStorage.upsert_lock(lock_type=daily_management_motion_restriction,target_member_id=target_member_id)
        - GovernanceStorage.update_case_fields(payload_json.public_summary_ref,execution_ref,resolved_at)
      api_calls:
        - Group.send_msg(daily_management_summary)
      emits:
        - governance_lock_applied
        - governance_result_published
        - side_effect_completed
    dissolve_current_council:
      binding_status: existing_runtime
      current_orchestration: src/vendors/nonebot_plugin_law/governance/manager.py::_finalize_case_vote
