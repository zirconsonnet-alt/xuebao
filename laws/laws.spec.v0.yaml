    turnout_min_of_all_voting_members: 1/2
    min_vote_period: 12h
    anonymous: true
  honor_owner_impeachment:
    sources:
      - 第三十六条
    approval:
      type: approve_gte_effective_votes_2_over_3
      approve_min_of_turnout: 3/5
    turnout_min_of_all_voting_members: 1/2
    min_vote_period: 24h
    anonymous: true
  elder_impeachment:
    sources:
      - 第三十九条第五款
      - 第十八条第七项
    approval:
      type: approve_gte_effective_votes_2_over_3
      approve_min_of_turnout: 3/5
    turnout_min_of_all_voting_members: 1/2
    min_vote_period: 12h
    anonymous: true
  elder_reboot:
    sources:
      - 第五十三条
    approval:
      type: approve_gte_effective_votes_2_over_3
      approve_min_of_turnout: 3/5
    turnout_min_of_all_voting_members: 1/2
    min_vote_period: 24h
    anonymous: true
  formal_discipline_long_mute:
    sources:
      - 第六十三条第二款
      - 第六十三条第六款
    approval:
      type: approve_gt_reject
      approve_min_of_turnout: 2/5
    turnout_min_of_all_voting_members: 1/3
    min_vote_period: 12h
    anonymous: true
  formal_discipline_restrict_candidacy:
    sources:
      - 第六十三条第三款
      - 第六十三条第六款
    approval:
      type: approve_gt_reject
      approve_min_of_turnout: 1/2
    turnout_min_of_all_voting_members: 1/2
    min_vote_period: 12h
    anonymous: true
  formal_discipline_restrict_vote_or_remove:
    sources:
      - 第六十三条第四款
      - 第六十三条第六款
    approval:
      type: approve_gte_effective_votes_2_over_3
      approve_min_of_turnout: 3/5
    turnout_min_of_all_voting_members: 1/2
    min_vote_period: 12h
    anonymous: true

human_review_gates:
  gate_collective_sovereignty_boundary:
    question: 当前动作是否把群视为私人财产、派系领地，或试图以身份、历史贡献、技术控制、临时多数超越群规
    sources:
      - 第一条
      - 第二条
  gate_member_basic_rights_boundary:
    question: 当前治理动作是否不当剥夺成员的讨论、提案、知情、申辩、复核、免受报复或基本尊严、隐私与群聊安全
    sources:
      - 第五条
  gate_member_basic_duty_match:
    question: 当前成员行为是否落入基本义务所禁止的侵害、虚构紧急状态、恶意重复提案或干扰程序
    sources:
      - 第六条
  gate_duplicate_account_determination:
    question: 是否构成明显重复小号
    sources:
      - 第四条第二项
      - 第四条第四项
    required_output:
      - confirmed
      - rejected
      - need_more_evidence
  gate_norm_conflict_core_guarantee:
    question: 该解释或适用是否损害上位规范核心保障
    sources:
      - 第三条
  gate_group_matter_scope:
    question: 提案是否属于群内事项，是否明显违反上位规范
    sources:
      - 第四条第十二项
      - 第十六条
  gate_governance_authority_boundary:
    question: 当前动作是否落在荣誉群主、元老会、机器人或技术保管人的法定权限边界内
    sources:
      - 第八条
      - 第十一条
      - 第十二条
  gate_bootstrap_override_boundary:
    question: 当前人工或技术保管动作是否只是必要初始化/修复，而未替代正式治理程序
    sources:
      - 第九条第四项
      - 第十条之一
  gate_elder_council_seat_count_review:
    question: 当前元老会目标席位是否已有明确基础治理条例设置
    sources:
      - 第二十七条第二款
  gate_elder_candidate_commitment_review:
    question: 候选人是否已明确承诺遵守程序中立和回避规则
    sources:
      - 第二十八条第三项
  gate_honor_owner_candidate_commitment_review:
    question: 荣誉群主候选人是否已明确表示愿意履职并接受监督
    sources:
      - 第二十一条第三项
      - 第二十二条
  gate_conflict_of_interest:
    question: 是否存在需要回避的重大利益冲突
    sources:
      - 第十三条
      - 第四十三条第二款
  gate_elder_council_high_risk_review:
    question: 当前元老会决定是否属于高风险程序判断或特别表决事项
    sources:
      - 第三十条第三款
  gate_elder_council_timeout_fallback_review:
    question: 元老会是否已经超时，以及下一顺位承接主体是否可启动
    sources:
      - 第三十一条
  gate_emergency_state_confirmation:
    question: 当前是否属于现实、持续、紧迫的紧急状态
    sources:
      - 第四十条
      - 第四十一条
  gate_objective_safety_risk_exception:
    question: 是否存在客观安全风险，以至于可触发例外处理
    sources:
      - 第三十五条第二款
      - 第四十二条第四款
      - 第四十四条第五项
      - 第五十一条第三项
  gate_same_major_fact_and_institutional_reason:
    question: 是否属于同一主要事实 / 同一制度性理由，或是否出现新的重大事实
    sources:
      - 第四十九条
      - 第五十条
      - 第五十五条
  gate_reboot_institutional_breakdown_review:
    question: 当前重组元老会动议是否基于制度性失灵，而非对个案裁决、立场差异或私人冲突的不满
    sources:
      - 第四十八条
      - 第四十九条
      - 第五十四条
  gate_signature_identity_and_case_completeness:
    question: 联署人身份是否有效，案件材料是否达到形式完备
    sources:
      - 第三十四条
      - 第三十九条第二款
      - 第五十条
  gate_impeachment_reason_catalog_match:
    question: 当前事实是否落入法定弹劾理由目录
    sources:
      - 第三十三条
      - 第三十八条
  gate_evidence_sufficiency_and_privacy:
    question: 证据是否达到可复核、相互印证且兼顾隐私保护
    sources:
      - 第五十八条
      - 第六十二条
  gate_notice_feasibility_review:
    question: 是否已尝试可行送达方式，且是否仍保留陈述与复核渠道
    sources:
      - 第六十条之一
      - 第六十一条
  gate_review_reason_validity:
    question: 复核理由是否属于法定范围
    sources:
      - 第六十五条第二款
  gate_vote_validity_review:
    question: 投票过程是否存在程序错误、重复票或身份不可确认票
    sources:
      - 第四条第五至第九项
      - 第十八条
      - 第十九条
  gate_retaliation_review:
    question: 该管理动作是否构成压制批评或报复
    sources:
      - 第四十五条
  gate_elder_council_prohibition_review:
    question: 当前元老会动作是否构成压制异见、泄密、不回避、越权或阻碍合法程序
    sources:
      - 第三十二条
  gate_bypass_formal_rulemaking:
    question: 当前动作是否在以临时措施或重复续期规避正式程序
    sources:
      - 第二十条
      - 第六十六条
  gate_platform_constraint_review:
    question: 平台限制、账号安全或外部强制规则是否真实存在且已采取最小必要保全
    sources:
      - 第十条之一第四款
  gate_roster_correction_review:
    question: 是否属于名册冻结后的允许更正事项
    sources:
      - 第四条第五项
  gate_rule_basis_match:
    question: 拟执行动作是否有明确规则依据
    sources:
      - 第七条
  gate_privacy_safe_public_summary:
    question: 公开摘要是否已避免不必要的隐私泄露
    sources:
      - 第五十八条
      - 第六十四条第四款
  gate_temporary_interpretation_boundary:
    question: 临时解释是否越过“仅为维持程序继续所必要”的边界
    sources:
      - 第六十七条
  gate_core_norm_amendment_boundary:
    question: 当前修订是否触及群规总则、基本权力结构或核心制度，并因此必须适用宪制修订案程序与明确条文变更
    sources:
      - 第六十八条
  gate_non_retroactivity_exception_review:
    question: 生效前已完成的旧程序是否存在重大程序违法或安全风险，因而可以作为不溯及既往的例外复核
    sources:
      - 第六十九条
  gate_emergency_abuse_review:
    question: 紧急措施是否构成滥用
    sources:
      - 第四十七条

