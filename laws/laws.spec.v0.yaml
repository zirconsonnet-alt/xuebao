meta:
  spec_id: xuebao.group_governance.v0
  title: 群法律可执行规范骨架 v0
  source_of_truth:
    file: laws/laws.md
    version: 群宪法及条例（建议修订稿 v2）
  status: acceptance_ready_executable_skeleton
  previous_status: partial_dev_contract
  revision: v0.2
  acceptance_baseline_date: 2026-04-23
  design:
    - 静态规则与程序工作流分离
    - 机器可判定规则与人工裁量节点分离
    - 先记录事件，再投影当前状态
    - 法律文本优先于现有实现
  scope:
    - 规则表
    - workflow_fsm
    - human_review_gates
    - audit_event_catalog
  non_goals:
    - 不自动替代事实认定
    - 不让模型直接作最终裁判
    - 不在本文件中固化 UI 或命令文案

spec_semantics:
  document_kind: executable_skeleton
  verbatim_law_mirror: false
  law_alignment_level: article_level_consistent_with_source_of_truth
  acceptance_scope:
    - 条号引用按“条”级与 source_of_truth 对齐
    - 本文件显式区分 derived_from_law 与 implementation_only 结构
    - runtime binding 只允许 existing_runtime、existing_runtime_case_scoped、partial_existing_runtime、planned_runtime
  origin_tag_legend:
    derived_from_law: 依据法律条文归纳、标准化或编译得到，不是原文逐字字段
    implementation_only: 仅为运行时绑定、存储、验证或验收而设，不属于法律原文
    not_verbatim_from_law: 本字段或区块不是法律文本的逐字镜像
  section_origin_tags:
    meta:
      - implementation_only
      - not_verbatim_from_law
    conventions:
      - derived_from_law
      - not_verbatim_from_law
    functions:
      - derived_from_law
      - not_verbatim_from_law
    entities:
      - implementation_only
      - not_verbatim_from_law
    derived_statuses:
      - derived_from_law
      - not_verbatim_from_law
    rule_atoms:
      - derived_from_law
      - not_verbatim_from_law
    threshold_sets:
      - derived_from_law
      - not_verbatim_from_law
    human_review_gates:
      - implementation_only
      - not_verbatim_from_law
    lock_types:
      - derived_from_law
      - not_verbatim_from_law
    side_effect_contracts:
      - implementation_only
      - not_verbatim_from_law
    workflow_fsm:
      - derived_from_law
      - not_verbatim_from_law
    workflow_dev_contracts:
      - implementation_only
      - not_verbatim_from_law
    audit_event_catalog:
      - implementation_only
      - not_verbatim_from_law
    projections:
      - implementation_only
      - not_verbatim_from_law
    invariants:
      - derived_from_law
      - not_verbatim_from_law

conventions:
  article_ref_style: 第X条第Y项
  percentage_rounding: ceil
  voting_math:
    turnout_count_includes:
      - approve
      - reject
      - abstain
    effective_votes_include:
      - approve
      - reject
    excluded_from_turnout:
      - duplicate_vote
      - identity_unverifiable_vote
      - clearly_invalid_vote
  interpretation_defaults:
    rights_sensitive_matters: favorable_to_rights_retention_and_procedure_continuation
    qualification_restriction_matters: narrow_interpretation

functions:
  ceil_ratio:
    source:
      - 第四条第十项
      - 附表说明
    input:
      - numerator
      - denominator
      - ratio
    output: integer_threshold
  higher_of:
    source:
      - 第三十四条第二至第四款
      - 第五十条第一至第三款
    input:
      - threshold_a
      - threshold_b
    output: integer_threshold
  voter_roster_snapshot:
    source: 第四条第五项
    description: 投票公告发出前 12 小时冻结选民名册
  notice_delivery_deadline:
    source: 第六十条之一
    description: 按送达渠道计算视为送达时间

entities:
  Member:
    key: member_id
    attributes:
      - joined_at
      - platform_role
      - is_bot
      - role_assignments
      - sanctions
      - contact_channels
  VoterRosterSnapshot:
    key: roster_id
    attributes:
      - snapshot_at
      - total_voting_members
      - frozen_member_ids
      - correction_log
  GovernanceCase:
    key: case_id
    subtypes:
      - ordinary_proposal
      - honor_owner_election
      - elder_election
      - honor_owner_impeachment
      - elder_impeachment
      - daily_management
      - emergency_protection
      - elder_reboot
      - formal_discipline
      - formal_discipline_review
  Vote:
    key: vote_id
    attributes:
      - roster_snapshot_id
      - anonymous
      - choices
      - opened_at
      - closed_at
      - tally
  Evidence:
    key: evidence_id
    attributes:
      - source_type
      - source_ref
      - collected_at
      - chain_of_custody
      - privacy_scope
      - summary
  Notice:
    key: notice_id
    attributes:
      - channel
      - sent_at
      - deemed_served_at
      - delivery_result
  GovernanceLock:
    key: lock_id
    attributes:
      - lock_type
      - target_member_id
      - source_case_id
      - active
      - expires_at
      - released_at
  GovernanceEvent:
    key: event_id
    attributes:
      - event_type
      - group_id
      - actor_id
      - subject_id
      - case_id
      - payload
      - created_at

derived_statuses:
  voting_member:
    source: 第四条第二项
    when:
      all:
        - joined_days_gte: 7
        - legal_disenfranchisement: false
        - obvious_duplicate_account: false
        - malicious_bot_account: false
    decidability:
      overall: mixed
      machine_decidable:
        - joined_days_gte
        - legal_disenfranchisement
        - malicious_bot_account
      human_review_required:
        - obvious_duplicate_account
  legal_disenfranchisement:
    source: 第四条第三项
    when_any:
      - formal_discipline_restriction_active
      - impeachment_freeze_active
      - reboot_freeze_active
      - temporary_procedural_freeze_explicitly_authorized
  high_risk_power:
    source: 第四条第十一项
    values:
      - kick_member
      - mute_over_24h
      - restrict_vote
      - restrict_candidacy
      - delete_or_hide_governance_record
      - change_bot_critical_permission
      - dissolve_or_migrate_group

rule_atoms:
  - id: art_01_group_commonwealth_nature
    article: 第一条
    category: global_guard
    subject: group_constitution
    when:
      trigger: governance_legitimacy_or_membership_basis_evaluated
    then:
      - treat_group_as_voluntary_public_discussion_and_collaboration_community
      - forbid_private_or_factional_ownership_claim_over_group
      - require_governance_legitimacy_to_trace_to_collective_member_authorization
      - joining_group_implies_notice_and_acceptance_of_group_norms_and_lawful_bylaws
    deadline: always
    exceptions: []
    review_entry: gate_collective_sovereignty_boundary
    decidability:
      overall: mixed
      machine_decidable:
        - governance_actor_type_identified
      human_review_required:
        - whether_group_is_being_treated_as_private_or_factional_property
        - whether_collective_authorization_has_been_bypassed

  - id: art_02_collective_sovereignty
    article: 第二条
    category: static_constraint
    subject: collective_authority
    when:
      trigger: governance_authority_claim_or_override_attempt_detected
    then:
      - all_voting_members_are_highest_autonomous_subject
      - all_offices_institutions_and_technical_permissions_remain_bound_by_group_norms
      - forbid_personal_identity_historical_contribution_technical_control_or_temporary_majority_override
    deadline: always
    exceptions: []
    review_entry: gate_collective_sovereignty_boundary
    decidability:
      overall: mixed
      machine_decidable:
        - office_or_permission_type_identified
      human_review_required:
        - whether_claimed_authority_exceeds_group_norms
        - whether_temporary_majority_is_used_to_break_core_constraints

  - id: art_03_norm_hierarchy
    article: 第三条
    category: static_constraint
    subject: norm_resolution
    when:
      trigger: norm_conflict_detected
    then:
      - apply_higher_level_norm_first
      - within_same_level_apply_special_over_general
      - within_same_level_apply_later_over_earlier
      - forbid_damage_to_core_guarantees
    deadline: null
    exceptions: []
    review_entry: gate_norm_conflict_core_guarantee
    decidability:
      overall: mixed
      machine_decidable:
        - level_order
        - special_vs_general
        - later_vs_earlier
      human_review_required:
        - core_guarantee_damage

  - id: art_04_02_voting_member_eligibility
    article: 第四条第二项
    category: derived_status
    subject: member
    when:
      trigger: eligibility_evaluated
    then:
      - derive_voting_member_status
    deadline: before_any_support_or_vote_window
    exceptions: []
    review_entry: gate_duplicate_account_determination
    decidability:
      overall: mixed
      machine_decidable:
        - joined_days_gte_7
        - legal_disenfranchisement_absent
      human_review_required:
        - obvious_duplicate_account_absent

  - id: art_04_05_voter_roster_freeze
    article: 第四条第五项
    category: voting_constraint
    subject: voter_roster
    when:
      trigger: vote_notice_published
    then:
      - create_roster_snapshot_at_minus_12h
      - freeze_total_voting_members
      - prohibit_arbitrary_change_until_vote_end
    deadline: immediately_on_vote_notice
    exceptions:
      - obvious_technical_error
      - member_voluntary_exit
      - explicit_correction_required_by_law
    review_entry: gate_roster_correction_review
    decidability:
      overall: mixed
      machine_decidable:
        - snapshot_timestamp
        - freeze_window
      human_review_required:
        - obvious_technical_error
        - explicit_correction_required_by_law

  - id: art_04_12_procedural_review_scope
    article: 第四条第十二项
    category: static_constraint
    subject: procedural_review
    when:
      trigger: proposal_submitted_for_procedural_review
    then:
      - only_check_format_completeness
      - only_check_is_group_matter
      - only_check_manifest_conflict_with_higher_norm
      - forbid_rejection_due_to_position_difference
    deadline: null
    exceptions: []
    review_entry: gate_group_matter_scope
    decidability:
      overall: mixed
      machine_decidable:
        - format_completeness
      human_review_required:
        - is_group_matter
        - manifest_conflict_with_higher_norm

  - id: art_05_basic_member_rights
    article: 第五条
    category: rights_rule
    subject: voting_member
    when:
      trigger: governance_action_or_sanction_affecting_member_requested
    then:
      - preserve_discussion_and_vote_participation_rights_for_voting_members_except_lawful_restriction
      - preserve_motion_proposal_emergency_impeachment_and_reboot_initiation_rights_for_voting_members
      - require_reason_basis_and_record_visibility_for_governance_actions
      - require_notice_defense_and_review_opportunity_before_and_after_sanction
      - forbid_retaliation_due_to_view_faction_or_vote_choice
      - protect_privacy_dignity_and_group_safety
    deadline: before_restriction_or_sanction_effective
    exceptions:
      - lawful_temporary_restriction_or_formal_discipline_or_emergency_measure
    review_entry: gate_member_basic_rights_boundary
    decidability:
      overall: mixed
      machine_decidable:
        - sanction_notice_and_review_channel_present
        - governance_record_reference_present
      human_review_required:
        - whether_retaliation_exists
        - whether_privacy_dignity_or_group_safety_has_been_infringed
        - whether_initiation_right_has_been_improperly_blocked

  - id: art_06_basic_member_duties
    article: 第六条
    category: conduct_rule
    subject: member_conduct
    when:
      trigger: member_conduct_evaluated
    then:
      - forbid_spam_abuse_harassment_threats_or_organized_pile_on
      - forbid_privacy_leak_doxxing_phishing_fraud_or_impersonation
      - forbid_illegal_malware_hate_extreme_violence_or_sexual_harassment_or_platform_prohibited_content
      - forbid_fake_emergency_abusive_impeachment_malicious_repeat_motion_or_vote_interference
      - require_respect_for_procedural_results_while_preserving_lawful_objection_channels
    deadline: always
    exceptions:
      - procedural_objection_expressed_through_lawful_channel
    review_entry: gate_member_basic_duty_match
    decidability:
      overall: mixed
      machine_decidable:
        - repeated_duplicate_motion_or_vote_interference_detected
      human_review_required:
        - whether_conduct_is_abuse_harassment_or_threat
        - whether_content_is_illegal_or_platform_prohibited
        - whether_objection_remains_within_procedural_channel

  - id: art_07_rule_basis_required
    article: 第七条
    category: global_guard
    subject: governance_action
    when:
      trigger: governance_action_requested
    then:
      - require_explicit_rule_basis
      - require_reason_basis_and_record
      - allow_review
    deadline: before_execution
    exceptions: []
    review_entry: gate_rule_basis_match
    decidability:
      overall: mixed
      machine_decidable:
        - record_presence
      human_review_required:
        - explicit_rule_basis_match

  - id: art_10_bot_boundary
    article:
      - 第十条
      - 第十条之一
    category: role_boundary
    subject: bot_and_platform_custodian
    when:
      trigger: platform_control_or_bot_action_requested
    then:
      - bot_may_only_do_procedural_judgment_and_technical_execution
      - platform_custodian_has_no_extra_governance_legitimacy
      - require_record_for_governance_operations
    deadline: always
    exceptions:
      - platform_limitation_or_external_force_major_risk
    review_entry: gate_platform_constraint_review
    decidability:
      overall: mixed
      machine_decidable:
        - bot_action_logged
      human_review_required:
        - external_force_major_risk
        - reasonable_time_for_handover

  - id: art_08_governance_organs_boundary
    article: 第八条
    category: role_boundary
    subject: governance_organs
    when:
      trigger: governance_authority_evaluated
    then:
      - all_voting_members_hold_rulemaking_election_and_final_major_decision_power
      - honor_owner_handles_daily_governance_execution
      - elder_council_handles_supervision_procedural_review_and_limited_emergency_proxy
      - bot_is_neutral_technical_executor_only
      - technical_custodian_has_no_independent_governance_legitimacy
    deadline: always
    exceptions:
      - explicit_bootstrap_or_technical_recovery_override_recorded
    review_entry: gate_governance_authority_boundary
    decidability:
      overall: mixed
      machine_decidable:
        - office_type_identified
        - bot_or_platform_custodian_not_treated_as_independent_political_role
      human_review_required:
        - whether_action_belongs_to_daily_execution_or_supervision
        - whether_bootstrap_override_remains_technical_only

  - id: art_09_office_separation
    article: 第九条
    category: role_boundary
    subject: governance_offices
    when:
      trigger: office_assignment_or_proxy_authority_evaluated
    then:
      - forbid_honor_owner_and_elder_dual_office
      - forbid_elder_as_honor_owner_proxy_except_explicit_emergency_proxy
      - ordinary_member_participation_does_not_create_office_status
      - forbid_technical_control_replacing_governance_procedure
    deadline: before_role_change_or_proxy_action_effective
    exceptions:
      - explicit_emergency_proxy_case
    review_entry: gate_bootstrap_override_boundary
    decidability:
      overall: mixed
      machine_decidable:
        - no_dual_office_between_honor_owner_and_elder
        - explicit_emergency_proxy_case_present
      human_review_required:
        - whether_action_uses_technical_control_to_replace_procedure

  - id: art_11_honor_owner_authority
    article: 第十一条
    category: execution_rule
    subject: honor_owner
    when:
      trigger: honor_owner_action_requested
    then:
      - allow_daily_discussion_order_maintenance
      - allow_execution_of_lawfully_passed_results
      - allow_temporary_management_for_ordinary_violations
      - allow_emergency_measure_start_confirmation_review_or_termination
      - allow_procedural_announcements
      - forbid_rulemaking_without_vote
      - forbid_blocking_lawful_impeachment_reboot_election_or_review
      - forbid_deleting_tampering_or_hiding_key_governance_records
      - forbid_retaliation_for_member_views_or_votes
      - forbid_disbanding_transfer_of_control_or_permanent_ban_without_explicit_authorization
    deadline: before_execution
    exceptions:
      - explicit_authorization_from_lawful_case_or_vote
    review_entry: gate_governance_authority_boundary
    decidability:
      overall: mixed
      machine_decidable:
        - lawful_result_execution
        - explicit_authorization_present
      human_review_required:
        - whether_measure_is_ordinary_or_major
        - whether_action_constitutes_retaliation
        - whether_record_tampering_occurred

  - id: art_12_elder_council_authority
    article: 第十二条
    category: review_rule
    subject: elder_council
    when:
      trigger: elder_council_action_requested
    then:
      - allow_supervision_of_honor_owner_compliance
      - allow_procedural_review_for_ordinary_matters
      - allow_complaint_and_review_intake
      - allow_limited_emergency_proxy_when_honor_owner_absent_or_unresponsive
      - allow_impeachment_initiation_by_procedure
      - require_periodic_supervision_summary_publication
      - forbid_political_preference_veto
      - forbid_long_delay_of_procedural_review
      - forbid_daily_governance_orders_without_emergency_basis
      - forbid_procedural_manipulation_when_self_under_reboot_impeachment_or_conflict
    deadline: before_resolution_or_proxy_action_effective
    exceptions:
      - explicit_emergency_proxy_case
    review_entry: gate_governance_authority_boundary
    decidability:
      overall: mixed
      machine_decidable:
        - complaint_or_review_request_recorded
        - emergency_proxy_case_present
      human_review_required:
        - whether_review_rejection_is_based_on_political_preference
        - whether_delay_is_unjustified
        - whether_proxy_action_exceeds_emergency_basis

  - id: art_13_recusal
    article: 第十三条
    category: global_guard
    subject: officials
    when:
      trigger: review_or_adjudication_started
    then:
      - require_recusal_if_self_case
      - require_recusal_if_impeachment_or_permission_change_or_major_conflict
      - preserve_fact_statement_as_ordinary_member
    deadline: before_review_or_vote_role_exercised
    exceptions: []
    review_entry: gate_conflict_of_interest
    decidability:
      overall: human_review_required
      machine_decidable: []
      human_review_required:
        - major_conflict_of_interest

  - id: art_14_proposal_classification
    article: 第十四条
    category: static_constraint
    subject: proposals
    when:
      trigger: proposal_created
    then:
      - require_exact_proposal_type_classification
      - route_basic_governance_norm_and_constitutional_amendment_through_rulemaking_workflow
      - route_temporary_measure_through_explicit_expiry_constraints
      - route_emergency_motion_through_existing_emergency_workflow
    deadline: before_procedural_review
    exceptions: []
    review_entry: gate_group_matter_scope
    decidability:
      overall: mixed
      machine_decidable:
        - proposal_type_present
        - proposal_type_supported
      human_review_required:
        - whether_subject_belongs_to_public_group_matter

  - id: art_15_proposal_required_fields
    article: 第十五条
    category: static_constraint
    subject: proposal_payload
    when:
      trigger: proposal_submitted
    then:
      - require_title
      - require_proposer_identity
      - require_purpose_and_reason
      - require_text_or_measure
      - require_effective_time_duration_or_expiry
      - require_high_risk_power_flag
    deadline: before_procedural_review
    exceptions: []
    review_entry: gate_group_matter_scope
    decidability:
      overall: machine_decidable
      machine_decidable:
        - required_fields_present
      human_review_required: []

  - id: art_16_ordinary_proposal_review
    article: 第十六条
    category: workflow_guard
    subject: ordinary_proposal
    when:
      trigger: ordinary_proposal_submitted
    then:
      - council_must_submit_or_request_fix_or_procedural_reject_with_reason
      - auto_enter_discussion_if_timeout
      - allow_escalation_after_procedural_reject_if_signature_threshold_met
    deadline: 48h
    exceptions: []
    review_entry: gate_group_matter_scope
    decidability:
      overall: mixed
      machine_decidable:
        - deadline_timeout
        - escalation_signature_count
      human_review_required:
        - procedural_reject_reason_validity

  - id: art_17_discussion_periods
    article: 第十七条
    category: timer_rule
    subject: proposal_discussion
    when:
      trigger: discussion_opened
    then:
      - ordinary_proposal_min_12h
      - basic_governance_norm_min_24h
      - constitutional_amendment_min_48h
      - emergency_may_shorten_but_no_long_term_temporary_measure
    deadline: per_case_type
    exceptions:
      - emergency_risk
    review_entry: gate_emergency_state_confirmation
    decidability:
      overall: mixed
      machine_decidable:
        - min_discussion_duration_by_type
      human_review_required:
        - emergency_risk_exists
        - temporary_measure_becoming_long_term

  - id: art_18_general_vote_thresholds
    article: 第十八条
    category: voting_rule
    subject: votes
    when:
      trigger: vote_closed
    then:
      - apply_case_specific_threshold_set
      - reject_if_turnout_threshold_not_met
      - publish_math_and_tally
      - require_anonymous_vote_for_rights_or_office_affecting_matters
    deadline: immediately_after_vote_close
    exceptions: []
    review_entry: gate_vote_validity_review
    decidability:
      overall: machine_decidable
      machine_decidable:
        - threshold_calculation
        - anonymity_requirement_by_case_type
        - tally_publication
      human_review_required: []

  - id: art_19_proposal_record_and_publication
    article: 第十九条
    category: audit_rule
    subject: proposal_vote_record
    when:
      trigger: proposal_vote_closed_or_review_requested
    then:
      - record_proposal_text_discussion_vote_window_turnout_and_tally
      - publish_result_in_group
      - record_procedural_review_request
    deadline: immediately_after_vote_close_or_review_request
    exceptions: []
    review_entry: gate_vote_validity_review
    decidability:
      overall: machine_decidable
      machine_decidable:
        - proposal_record_fields_present
        - tally_and_public_summary_recorded
        - review_request_recorded
      human_review_required: []

  - id: art_20_temporary_measure_limit
    article: 第二十条
    category: static_constraint
    subject: temporary_measure
    when:
      trigger: temporary_measure_defined_or_extended
    then:
      - require_explicit_expiry
      - max_duration_7d
      - require_conversion_if_over_7d
      - forbid_repeat_renewal_to_bypass_formal_rulemaking
      - forbid_permanent_deprivation_of_basic_rights
    deadline: before_effective
    exceptions: []
